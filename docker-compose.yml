version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ticket_db
      JWT_SECRET: supersecretjwtkeyfordevenvironment32chars!
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "node db/migrate.js && node db/seed.js && node dist/index.js"

  frontend:
    build:
      context: ./ui
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
